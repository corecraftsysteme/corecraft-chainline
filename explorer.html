<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chain2025 — Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="portal.css">
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="chronik.html">Chronik</a>
  <a href="explorer.html">Explorer</a>
  <a href="rituale.html">Rituale</a>
</div>

<div class="wrap">
  <span class="tag">Chain2025</span>
  <h1>Explorer</h1>
  <p>Automatisch generierte Liste aus <code>explorer.json</code>.</p>

  <div class="card">
    <h2>Dokumentation</h2>
    <ul id="doclist"></ul>
  </div>
</div>

<script>
  fetch("explorer.json")
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById("doclist");
      data.docs.forEach(path => {
        const name = path.split("/").pop();
        list.innerHTML += `<li><a href="${path}">${name}</a></li>`;
      });
    });
</script>

</body>
</html>
