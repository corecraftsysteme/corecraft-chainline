<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chain2025 Chronik — Dynamic Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background:#05060a; color:#f5f5f5; }
    .wrap { max-width: 900px; margin: 0 auto; }
    .timeline { margin-top:2rem; border-left:2px solid #333; padding-left:2rem; }
    .entry { margin-bottom:2rem; position:relative; }
    .entry::before {
      content:"";
      position:absolute;
      left:-1.1rem;
      top:.3rem;
      width:12px;
      height:12px;
      background:#7fd4ff;
      border-radius:50%;
      box-shadow:0 0 8px #7fd4ff;
    }
    .date { font-size:.85rem; opacity:.7; }
    .title { font-size:1.2rem; margin:.2rem 0; }
    .desc { opacity:.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chain2025 — Chronik</h1>
    <p>Dynamische Timeline aus <code>chronik.json</code>.</p>

    <div id="timeline" class="timeline"></div>

    <p style="margin-top:3rem;">
      <a href="index.html">← Back to Home</a>
    </p>
  </div>

  <script>
    fetch("chronik.json")
      .then(r => r.json())
      .then(data => {
        const t = document.getElementById("timeline");
        const c = data.chain2025;

        function addEntry(e) {
          t.innerHTML += `
            <div class="entry">
              <div class="date">${e.id}</div>
              <div class="title">${e.title}</div>
              <div class="desc">${e.description}</div>
            </div>`;
        }

        addEntry(c.genesis);
        c.echo.forEach(addEntry);
        addEntry(c.closure);
      });
  </script>
</body>
</html>
