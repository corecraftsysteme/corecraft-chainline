<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chain2025 — Chronik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="portal.css">
  <style>
    .timeline { margin-top:2rem; border-left:2px solid #333; padding-left:2rem; }
    .entry { margin-bottom:2rem; position:relative; }
    .entry::before {
      content:"";
      position:absolute;
      left:-1.1rem;
      top:.3rem;
      width:12px;
      height:12px;
      background:#7fd4ff;
      border-radius:50%;
      box-shadow:0 0 8px #7fd4ff;
    }
    .date { font-size:.85rem; opacity:.7; }
    .title { font-size:1.2rem; margin:.2rem 0; }
    .desc { opacity:.85; }
  </style>
</head>

<body>

<div id="header"></div>
<script>
  fetch("header.html")
    .then(r => r.text())
    .then(h => document.getElementById("header").innerHTML = h);
</script>

  <a href="index.html">Home</a>
  <a href="chronik.html">Chronik</a>
  <a href="explorer.html">Explorer</a>
  <a href="rituale.html">Rituale</a>
</div>

<div class="wrap">
  <span class="tag">Chain2025</span>
  <h1>Chronik</h1>
  <p>Dynamische Timeline aus <code>chronik.json</code>.</p>

  <div id="timeline" class="timeline"></div>
</div>

<script>
  fetch("chronik.json")
    .then(r => r.json())
    .then(data => {
      const t = document.getElementById("timeline");
      const events = [];

      events.push(data.chain2025.genesis);
      data.chain2025.echo.forEach(e => events.push(e));
      events.push(data.chain2025.closure);

      events.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      events.forEach(ev => {
        t.innerHTML += `
          <div class="entry">
            <div class="date">${ev.id}</div>
            <div class="title">${ev.title}</div>
            <div class="desc">${ev.description}</div>
          </div>
        `;
      });
    });
</script>

</body>
</html>
