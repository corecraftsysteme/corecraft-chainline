<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chain2025 — Chronik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="portal.css">
  <style>
    .timeline { margin-top:2rem; border-left:2px solid #333; padding-left:2rem; }
    .entry { margin-bottom:2rem; position:relative; }
    .entry::before {
      content:"";
      position:absolute;
      left:-1.1rem;
      top:.3rem;
      width:12px;
      height:12px;
      background:#7fd4ff;
      border-radius:50%;
      box-shadow:0 0 8px #7fd4ff;
    }
    .date { font-size:.85rem; opacity:.7; }
    .title { font-size:1.2rem; margin:.2rem 0; }
    .desc { opacity:.85; }
  </style>
</head>

<body>

<div id="header"></div>
<script>
  fetch("header.html")
    .then(r => r.text())
    .then(h => document.getElementById("header").innerHTML = h);
</script>

<div class="wrap">
  <span class="tag">Chain2025</span>
  <h1>Chronik</h1>
  <p>Dynamische Timeline aus <code>chronik.json</code>.</p>

  <div id="timeline" class="timeline"></div>
</div>

<script>
fetch(file)
  .then(r => r.text())
  .then(md => {

    // Überschriften
    md = md.replace(/^# (.*$)/gim, "<h1>$1</h1>");
    md = md.replace(/^## (.*$)/gim, "<h2>$1</h2>");
    md = md.replace(/^### (.*$)/gim, "<h3>$1</h3>");

    // Bold / Italic
    md = md.replace(/\*\*(.*?)\*\*/gim, "<b>$1</b>");
    md = md.replace(/\*(.*?)\*/gim, "<i>$1</i>");

    // Inline Code
    md = md.replace(/`([^`]+)`/gim, "<code>$1</code>");

    // Absätze statt alles zu <br> machen
    md = md.replace(/\n{2,}/g, "</p><p>");
    md = "<p>" + md + "</p>";

    document.getElementById("content").innerHTML = md;
  });
</script>

</body>
</html>
