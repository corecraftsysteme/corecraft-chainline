<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Chain2025 — Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/portal.css">
</head>

<body>

<div id="header"></div>
<script>
  fetch("/header.html")
    .then(r => r.text())
    .then(h => document.getElementById("header").innerHTML = h);
</script>

<div class="wrap">
  <span class="tag">Chain2025</span>
  <h1>Explorer</h1>
  <p>Daten aus <code>explorer.json</code>.</p>

  <div id="list"></div>
</div>

<script>
  fetch("explorer.json")
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById("list");
      data.items.forEach(item => {
        list.innerHTML += `
          <div class="entry">
            <div class="title">${item.title}</div>
            <div class="desc">${item.description}</div>
            <a href="/viewer/?file=${item.file}">Öffnen</a>
          </div>
        `;
      });
    });
</script>

</body>
</html>
